name: Bug report
description: Report a problem or unexpected behavior in Augur OS
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Thanks for taking the time to file a bug report. Please fill in the details below so we can reproduce and fix it.
  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug and what you expected instead.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: How can we reproduce the problem?
      placeholder: |
        1. Go to ...
        2. Click on ...
        3. See the error
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen?
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: e.g. macOS 15.4, Windows 11
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Augur OS version
      description: The app version, or the commit hash if you built from source.
      placeholder: e.g. 0.2.1
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs or screenshots
      description: Paste any relevant logs, errors, or screenshots. Remove API keys and personal data first.
    validations:
      required: false
