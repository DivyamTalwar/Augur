<svg width="360" height="104" viewBox="0 0 360 104" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Augur OS</title>
  <desc id="desc">Fiery angular A mark for Augur OS.</desc>
  <defs>
    <linearGradient id="edge" x1="24" y1="90" x2="90" y2="16" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FF5B1F"/>
      <stop offset="0.45" stop-color="#FF8A3D"/>
      <stop offset="0.72" stop-color="#FFC494"/>
      <stop offset="1" stop-color="#FF5B1F"/>
    </linearGradient>
    <linearGradient id="flare" x1="28" y1="60" x2="78" y2="50" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFC494"/>
      <stop offset="0.28" stop-color="#FF8A3D"/>
      <stop offset="1" stop-color="#FF5B1F"/>
    </linearGradient>
    <radialGradient id="ember" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(58 89) rotate(-90) scale(66 60)">
      <stop stop-color="#FF8A3D" stop-opacity="0.92"/>
      <stop offset="0.2" stop-color="#FF5B1F" stop-opacity="0.64"/>
      <stop offset="0.68" stop-color="#1A1714" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#1A1714" stop-opacity="0"/>
    </radialGradient>
    <filter id="glow" x="-18" y="-18" width="148" height="148" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="3.4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 1  0 0.34 0 0 0.18  0 0 0.05 0 0  0 0 0 0.82 0" result="hot"/>
      <feMerge>
        <feMergeNode in="hot"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="8" y="8" width="88" height="88" rx="20" fill="#1A1714"/>
  <rect x="9" y="9" width="86" height="86" rx="19" stroke="#FF5B1F" stroke-opacity="0.34" stroke-width="2"/>
  <ellipse cx="52" cy="88" rx="35" ry="7" fill="url(#ember)"/>
  <path d="M20 87 49.4 21.6c2.8-6.2 11.6-6.3 14.6-.2L94 87 76.3 77 57 34.5 48.3 53.3 29.6 60.5 20 87Z" fill="#1A1714" stroke="url(#edge)" stroke-width="4" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M27.5 60.5 51 51.4 61.2 29.6 77.9 77.5" stroke="#FF8A3D" stroke-width="1.15" stroke-linecap="round" stroke-linejoin="round" opacity="0.8"/>
  <path d="M25 59.8 56.6 48.8 66 45.4C55.2 50.5 47 60.3 39.7 77.7L20 87 34.2 62.8 56.6 48.8" fill="#1A1714" stroke="url(#flare)" stroke-width="3.2" stroke-linejoin="round" filter="url(#glow)"/>
  <path d="M20 87 39.9 77.5M57 34.5 94 87" stroke="#FFC494" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
  <path d="M23 45 15 39M82 27 90 17M86 47 97 39" stroke="#FF5B1F" stroke-linecap="round" opacity="0.72"/>

  <text x="116" y="52" fill="#1A1714" font-family="Instrument Serif, ui-serif, Georgia, serif" font-size="38" font-weight="400" letter-spacing="-0.4">Augur</text>
  <text x="232" y="52" fill="#FF5B1F" font-family="Instrument Serif, ui-serif, Georgia, serif" font-style="italic" font-size="38" font-weight="400" letter-spacing="-0.4">OS</text>
  <text x="118" y="74" fill="#8B8378" font-family="JetBrains Mono, Menlo, monospace" font-size="11" font-weight="700" letter-spacing="1.8">SIGNAL ENGINE</text>
